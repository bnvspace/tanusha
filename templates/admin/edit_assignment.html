{% extends 'base.html' %}
{% block title %}Редактировать задание{% endblock %}
{% block content %}
<div class="topbar">
  <div><h1>✏️ Редактировать задание</h1></div>
  <a href="{{ url_for('admin_course') }}" class="btn btn-secondary btn-sm">← Назад</a>
</div>
<div class="card">
  <form method="POST">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label class="form-label">Неделя</label>
        <select name="week_id" class="form-control" required>
          {% for week in course.weeks %}
          <option value="{{ week.id }}" {{ 'selected' if week.id == assignment.week_id }}>Неделя {{ week.number }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Видимость</label>
        <select name="visible" class="form-control">
          <option value="1" {{ 'selected' if assignment.visible }}>Видимо</option>
          <option value="0" {{ 'selected' if not assignment.visible }}>Скрыто</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input type="text" name="title" class="form-control" value="{{ assignment.title }}" required>
    </div>
    <div class="form-group">
      <label class="form-label">Описание</label>
      <textarea name="description" class="form-control" rows="6">{{ assignment.description or '' }}</textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label class="form-label">Дедлайн</label>
        <input type="datetime-local" name="deadline" class="form-control"
          value="{{ assignment.deadline.strftime('%Y-%m-%dT%H:%M') if assignment.deadline else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Дата открытия</label>
        <input type="datetime-local" name="open_date" class="form-control"
          value="{{ assignment.open_date.strftime('%Y-%m-%dT%H:%M') if assignment.open_date else '' }}">
      </div>
    </div>
    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
  </form>
</div>
{% endblock %}
