{% extends 'base.html' %}
{% block title %}Редактировать материал{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h1>✏️ Редактировать материал</h1>
  </div>
  <a href="{{ url_for('admin_course') }}" class="btn btn-secondary btn-sm">← Назад</a>
</div>
<div class="card">
  <form method="POST" enctype="multipart/form-data">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label class="form-label">Неделя</label>
        <select name="week_id" class="form-control" required>
          {% for week in course.weeks %}
          <option value="{{ week.id }}" {{ 'selected' if week.id == material.week_id }}>Неделя {{ week.number }}: {{ week.title }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Тип материала</label>
        <select name="material_type" class="form-control">
          {% for t in ['text','file','video','audio','link','interactive'] %}
          <option value="{{ t }}" {{ 'selected' if t == material.material_type }}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input type="text" name="title" class="form-control" value="{{ material.title }}" required>
    </div>
    <div class="form-group">
      <label class="form-label">Содержание / описание</label>
      <textarea name="content" class="form-control" rows="4">{{ material.content or '' }}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">URL</label>
      <input type="url" name="url" class="form-control" value="{{ material.url or '' }}">
    </div>
    <div class="form-group">
      <label class="form-label">Заменить файл</label>
      <input type="file" name="file" class="form-control">
      {% if material.file_path %}
      <div class="form-hint">Текущий файл: <a href="{{ url_for('uploaded_file', filename=material.file_path) }}" target="_blank">скачать</a></div>
      {% endif %}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label class="form-label">Дата открытия</label>
        <input type="datetime-local" name="open_date" class="form-control"
          value="{{ material.open_date.strftime('%Y-%m-%dT%H:%M') if material.open_date else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Видимость</label>
        <select name="visible" class="form-control">
          <option value="1" {{ 'selected' if material.visible }}>Видимо</option>
          <option value="0" {{ 'selected' if not material.visible }}>Скрыто</option>
        </select>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
  </form>
</div>
{% endblock %}
